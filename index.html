<script src="https://cdn.tailwindcss.com"></script>
<style>
:root {
  --mint: #14b8a6;
  --mint-dark: #0f766e;
  --green: #22c55e;
  --yellow: #facc15;
  --cream: #fffdf5;
  --paper: rgba(255, 255, 255, 0.88);
  --ink: #14342f;
  --muted: #64748b;
  --line: rgba(20, 52, 47, 0.12);
  --shadow: 0 24px 80px rgba(15, 118, 110, 0.14);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  color: var(--ink);
  background:
    radial-gradient(circle at 12% 12%, rgba(250, 204, 21, 0.24), transparent 26%),
    radial-gradient(circle at 88% 10%, rgba(20, 184, 166, 0.18), transparent 30%),
    linear-gradient(135deg, #f7fee7 0%, #ecfeff 48%, #fff7ed 100%);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", system-ui, sans-serif;
}

.app {
  width: min(1120px, 100%);
  margin: 0 auto;
  padding: 28px 20px 56px;
}

.hero {
  position: relative;
  overflow: hidden;
  display: grid;
  grid-template-columns: 1.1fr 0.9fr;
  gap: 28px;
  align-items: center;
  min-height: 420px;
  padding: 40px;
  border: 1px solid var(--line);
  border-radius: 34px;
  background: linear-gradient(135deg, rgba(255,255,255,0.92), rgba(255,253,245,0.78));
  box-shadow: var(--shadow);
}

.hero::after {
  content: "";
  position: absolute;
  inset: auto -70px -110px auto;
  width: 300px;
  height: 300px;
  border-radius: 999px;
  background: rgba(20, 184, 166, 0.12);
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  width: fit-content;
  padding: 9px 14px;
  border: 1px solid rgba(20, 184, 166, 0.24);
  border-radius: 999px;
  background: rgba(236, 253, 245, 0.9);
  color: var(--mint-dark);
  font-weight: 800;
  font-size: 0.92rem;
}

h1 {
  margin: 18px 0 14px;
  font-size: clamp(2.15rem, 5vw, 4.5rem);
  line-height: 1.04;
  letter-spacing: -0.06em;
}

.hero p {
  margin: 0;
  max-width: 650px;
  color: #365a54;
  font-size: 1.08rem;
  line-height: 1.8;
}

.hero-visual {
  position: relative;
  z-index: 1;
  min-height: 300px;
  border-radius: 30px;
  background:
    linear-gradient(160deg, rgba(255,255,255,0.5), rgba(255,255,255,0.9)),
    linear-gradient(135deg, #ccfbf1, #fef9c3);
  border: 1px solid rgba(255,255,255,0.72);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
  overflow: hidden;
  padding-top: 18px;
}

.sun {
  position: absolute;
  top: 28px;
  right: 32px;
  width: 84px;
  height: 84px;
  border-radius: 999px;
  background: #fde68a;
  box-shadow: 0 0 0 18px rgba(253, 230, 138, 0.25);
}

.person {
  position: absolute;
  bottom: 0;
  border-radius: 80px 80px 0 0;
  background: var(--mint);
}

.person.doctor {
  left: 28px;
  width: 88px;
  height: 210px;
  background: linear-gradient(#ffffff 0 48%, #5eead4 48%);
}

.person.patient {
  left: 128px;
  width: 96px;
  height: 180px;
  background: linear-gradient(#fde68a 0 48%, #fef3c7 48%);
}

.person.staff {
  right: 22px;
  width: 84px;
  height: 198px;
  background: linear-gradient(#99f6e4 0 48%, #2dd4bf 48%);
}

.face {
  position: absolute;
  top: -34px;
  left: 50%;
  width: 58px;
  height: 58px;
  transform: translateX(-50%);
  border-radius: 999px;
  background: #fed7aa;
  box-shadow: inset 0 -7px 0 rgba(180, 83, 9, 0.08);
}

.card-float {
  position: absolute;
  left: 24px;
  top: 24px;
  width: min(172px, calc(100% - 48px));
  padding: 16px;
  border-radius: 22px;
  background: rgba(255,255,255,0.88);
  box-shadow: 0 16px 44px rgba(15, 118, 110, 0.12);
}

.check {
  display: flex;
  gap: 8px;
  align-items: center;
  margin: 9px 0;
  color: var(--mint-dark);
  font-weight: 800;
}

.check span:first-child {
  width: 22px;
  height: 22px;
  display: grid;
  place-items: center;
  border-radius: 8px;
  background: #ccfbf1;
}

.section {
  margin-top: 26px;
  padding: 28px;
  border: 1px solid var(--line);
  border-radius: 30px;
  background: var(--paper);
  box-shadow: 0 16px 60px rgba(15, 118, 110, 0.08);
  backdrop-filter: blur(12px);
}

.section-title {
  display: flex;
  gap: 12px;
  align-items: center;
  margin: 0 0 18px;
  font-size: 1.42rem;
  letter-spacing: -0.03em;
}

.icon {
  width: 38px;
  height: 38px;
  display: grid;
  place-items: center;
  border-radius: 14px;
  background: #ccfbf1;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}

.principle {
  padding: 20px;
  border: 1px solid var(--line);
  border-radius: 22px;
  background: #ffffff;
}

.principle strong {
  display: block;
  margin-bottom: 8px;
  font-size: 1.05rem;
}

.principle p {
  margin: 0;
  color: var(--muted);
  line-height: 1.65;
}

.compare {
  display: grid;
  gap: 12px;
}

.compare-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  align-items: stretch;
}

.bad-talk,
.good-talk {
  padding: 16px 18px;
  border-radius: 20px;
  line-height: 1.65;
}

.bad-talk {
  background: #fff1f2;
  color: #9f1239;
}

.good-talk {
  background: #ecfdf5;
  color: #047857;
  font-weight: 800;
}

.flow {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
}

.step {
  position: relative;
  padding: 20px;
  border-radius: 22px;
  background: linear-gradient(180deg, #ffffff, #f8fafc);
  border: 1px solid var(--line);
}

.step-number {
  width: 34px;
  height: 34px;
  display: grid;
  place-items: center;
  margin-bottom: 12px;
  border-radius: 12px;
  background: var(--mint);
  color: white;
  font-weight: 900;
}

.scenario-wrap {
  display: grid;
  grid-template-columns: 0.95fr 1.05fr;
  gap: 18px;
}

.scenario-list {
  display: grid;
  gap: 10px;
}

.scenario-btn {
  width: 100%;
  padding: 15px 16px;
  border: 1px solid var(--line);
  border-radius: 18px;
  background: #ffffff;
  color: var(--ink);
  font: inherit;
  font-weight: 800;
  text-align: left;
  cursor: pointer;
  transition: 0.18s ease;
}

.scenario-btn:hover,
.scenario-btn.active {
  transform: translateY(-1px);
  border-color: rgba(20, 184, 166, 0.42);
  background: #f0fdfa;
}

.script-card {
  min-height: 260px;
  padding: 22px;
  border-radius: 24px;
  background: linear-gradient(135deg, #ffffff, #fefce8);
  border: 1px solid var(--line);
}

.script-card h3 {
  margin: 0 0 12px;
  font-size: 1.25rem;
}

.script-card ul {
  margin: 0;
  padding-left: 20px;
  color: #365a54;
  line-height: 1.8;
}

.checklist {
  display: grid;
  gap: 10px;
}

.check-item {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  padding: 14px 16px;
  border: 1px solid var(--line);
  border-radius: 18px;
  background: #ffffff;
  cursor: pointer;
}

.check-item input {
  width: 20px;
  height: 20px;
  accent-color: var(--mint);
}

.check-item.done {
  background: #ecfdf5;
  color: #047857;
}

.progress {
  margin-top: 16px;
  height: 12px;
  overflow: hidden;
  border-radius: 999px;
  background: rgba(20, 184, 166, 0.12);
}

.progress-bar {
  height: 100%;
  width: 0%;
  border-radius: inherit;
  background: linear-gradient(90deg, var(--mint), var(--green));
  transition: width 0.25s ease;
}

.progress-bar.progress-0 { width: 0%; }
.progress-bar.progress-20 { width: 20%; }
.progress-bar.progress-40 { width: 40%; }
.progress-bar.progress-60 { width: 60%; }
.progress-bar.progress-80 { width: 80%; }
.progress-bar.progress-100 { width: 100%; }

.footer-note {
  margin-top: 18px;
  padding: 18px 20px;
  border-radius: 22px;
  background: #fef9c3;
  color: #713f12;
  line-height: 1.7;
  font-weight: 800;
}

@media (max-width: 860px) {
  .hero,
  .scenario-wrap,
  .compare-row {
    grid-template-columns: 1fr;
  }

  .grid,
  .flow {
    grid-template-columns: 1fr;
  }

  .hero {
    padding: 28px;
  }
}
@media (max-width: 520px) {
  .hero-visual {
    min-height: 340px;
  }

  .person.doctor {
    left: 20px;
    width: 84px;
    height: 200px;
  }

  .person.patient {
    left: 112px;
    width: 92px;
    height: 170px;
  }

  .person.staff {
    right: 16px;
    width: 80px;
    height: 188px;
  }
}
</style>
